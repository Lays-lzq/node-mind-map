<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.ico" />
  <title>L的奇思妙想</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #app-loading {
      position: relative;
      width: 100%;
      height: 100%;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app-loading .loading-logo-wrap {
      position: absolute;
      left: 50%;
      top: 27%;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: translateX(-50%);
    }
    #app-loading .loading-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      font-size: 36px;
      font-weight: 700;
      color: #667eea;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }
    #app-loading .loading-brand {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-loading">
      <!-- <div class="loading-logo-wrap">
        <div class="loading-logo">L</div>
        <p class="loading-brand">L的奇思妙想</p>
      </div> -->
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
